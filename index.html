<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>$PMUSH LILLY PAD HOP</title>
    <style>
        body { margin:0; padding:0; background:#0a0a0a; overflow:hidden; touch-action:none; font-family:system-ui,-apple-system,sans-serif; }
        canvas { display:block; margin:0 auto; border:6px solid #00ff9d; box-shadow:0 0 40px #00ff9d, 0 0 80px #8b00ff; }
        #ui { position:absolute; top:15px; left:50%; transform:translateX(-50%); color:#00ff9d; font-size:28px; text-shadow:0 0 15px #00ff9d, 0 0 30px #8b00ff; pointer-events:none; z-index:10; display:flex; gap:25px; }
        .menu { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(10,5,30,0.95); border:6px solid #8b00ff; border-radius:20px; padding:30px; text-align:center; width:340px; box-shadow:0 0 60px #8b00ff; z-index:20; }
        button { margin:12px 0; padding:14px 40px; font-size:22px; background:#00ff9d; color:#000; border:none; border-radius:12px; width:100%; box-shadow:0 0 20px #00ff9d; }
        button:hover { background:#ff00cc; color:white; }
        input { padding:12px; font-size:20px; width:80%; margin:15px 0; border-radius:8px; border:none; text-align:center; background:#1a1a2e; color:white; }
        .player-option { display:inline-block; margin:8px; width:70px; height:70px; cursor:pointer; border:4px solid transparent; border-radius:50%; }
        .player-option.selected { border:4px solid #ff00cc; box-shadow:0 0 20px #ff00cc; }
        .lb-entry { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #333; }
        .pause-btn { position:absolute; top:60px; right:20px; font-size:32px; cursor:pointer; z-index:15; }
    </style>
</head>
<body>
    <canvas id="canvas" width="400" height="700"></canvas>

    <!-- Username -->
    <div id="usernameScreen" class="menu" style="display:none;">
        <h2 style="color:#ff00cc;">ENTER YOUR NAME</h2>
        <input id="usernameInput" type="text" placeholder="Sporeholder420" maxlength="20">
        <button onclick="saveUsernameAndContinue()">CONTINUE</button>
        <button onclick="backToTitle()" style="background:#555;">BACK</button>
    </div>

    <!-- Main Menu -->
    <div id="mainMenu" class="menu">
        <h1 style="font-size:42px; margin:0; color:#ff00cc; text-shadow:0 0 20px #ff00cc;">$PMUSH</h1>
        <h2 style="margin:10px 0 30px; color:#00ff9d; font-size:28px;">LILLY PAD HOP</h2>
        <button onclick="startGame()">PLAY</button>
        <button onclick="showLeaderboard()">LEADERBOARD</button>
        <button onclick="showPlayerSelect()">CHOOSE CAP</button>
        <div style="margin-top:20px; color:#aaa;">High Score: <span id="menuHigh" style="color:#00ff9d;">0</span></div>
    </div>

    <!-- Player Select -->
    <div id="playerSelect" class="menu" style="display:none;">
        <h2 style="color:#ff00cc;">CHOOSE YOUR CAP</h2>
        <div id="capOptions"></div>
        <button onclick="startGameFromSelect()" style="margin-top:20px;">START JUMPING</button>
        <button onclick="backToMainMenu()" style="background:#555;">BACK</button>
    </div>

    <!-- Leaderboard -->
    <div id="leaderboardScreen" class="menu" style="display:none;">
        <h2 style="color:#ff00cc;">LEADERBOARD</h2>
        <div id="lbList" style="text-align:left; max-height:380px; overflow-y:auto; margin:15px 0;"></div>
        <button onclick="backToMainMenu()">BACK TO MENU</button>
    </div>

    <!-- Pause Menu -->
    <div id="pauseMenu" class="menu" style="display:none;">
        <h2 style="color:#ff00cc;">PAUSED</h2>
        <button onclick="resumeGame()">RESUME</button>
        <button onclick="quitToMain()">QUIT TO MAIN MENU</button>
    </div>

    <!-- Game UI -->
    <div id="ui" style="display:none;">
        <div>SCORE: <span id="score">0</span></div>
        <div>BEST: <span id="highScore">0</span></div>
        <div onclick="pauseGame()" class="pause-btn">⏸</div>
    </div>

    <!-- Game Over -->
    <div id="gameOver" class="menu" style="display:none;">
        <h1 style="margin:0; font-size:36px; color:#ff00cc;">GAME OVER</h1>
        <p style="font-size:24px; margin:15px 0 5px;">Your $PMUSH score:</p>
        <p id="finalScore" style="font-size:42px; color:#00ff9d; margin:0;"></p>
        <button onclick="submitScoreAndBack()" style="margin-top:10px;">SUBMIT & BACK TO MENU</button>
        <button onclick="viewLeaderboardFromGameOver()" style="margin-top:10px; background:#00ffff; color:#000;">VIEW LEADERBOARD</button>
        <button onclick="startGame()" style="margin-top:10px; background:#ff00cc;">PLAY AGAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let gameState = 'menu';
        let gameRunning = false;
        let gameTime = 0;
        let username = localStorage.getItem('pmushUsername') || '';
        let selectedCapColor = localStorage.getItem('pmushCapColor') || '#4A7CFF';
        let touchLeft = false;
        let touchRight = false;
        let keys = {};
        let jetpackTime = 0;
        let magnetTime = 0;
        let combo = 0;
        let comboTimer = 0;
        let bgLevel = 0;

        let player = { x: 180, y: 450, width: 48, height: 52, dy: 0, speed: 7.5, vx: 0 };
        let platforms = [];
        let particles = [];
        let powerUps = [];
        let gravity = 0.58;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('pmushHigh')) || 0;
        let leaderboard = JSON.parse(localStorage.getItem('pmushLB')) || [];

        const capColors = ['#4A7CFF', '#FF00CC', '#00FF88', '#FFAA00', '#AA00FF', '#FF0088', '#00AAFF', '#FFCC00'];

        function getBackgroundColors(level) {
            const palettes = [
                {sky1:'#1a0033', sky2:'#2a0055', stars:'#aaffff'},
                {sky1:'#3a0033', sky2:'#6a0088', stars:'#ff88ff'},
                {sky1:'#001133', sky2:'#006699', stars:'#88ffff'},
                {sky1:'#003311', sky2:'#008844', stars:'#aaff88'},
                {sky1:'#110033', sky2:'#4400aa', stars:'#ff88cc'}
            ];
            return palettes[level % palettes.length];
        }

        function drawBackground() {
            const colors = getBackgroundColors(bgLevel);
            const grad = ctx.createLinearGradient(0,0,0,canvas.height);
            grad.addColorStop(0, colors.sky1);
            grad.addColorStop(0.5, colors.sky2);
            grad.addColorStop(1, '#000011');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,canvas.width,canvas.height);

            ctx.fillStyle = 'rgba(255,255,255,0.16)';
            ctx.font = 'bold 26px system-ui';
            ctx.textAlign = 'left';
            const text = '$PMUSH TO THE MOON 🚀';
            for (let i = -1; i < 6; i++) {
                ctx.fillText(text, (gameTime * 0.75 % 650) - 220 + i * 310, 85 + i * 68);
            }

            ctx.shadowBlur = 8; ctx.shadowColor = colors.stars;
            for (let i = 0; i < 40; i++) {
                const x = (i*29 + gameTime*0.12) % canvas.width;
                const y = (i*17) % (canvas.height*0.75);
                ctx.fillStyle = `rgba(255,255,255,${0.6+Math.random()*0.4})`;
                ctx.fillRect(x,y,2.5,2.5);
            }
            ctx.shadowBlur = 0;
        }

        function generatePlatforms() {
            platforms = [];
            for (let i = 0; i < 9; i++) {
                const springChance = Math.min(0.13, 0.06 + score / 16000);
                platforms.push({ x: Math.random() * (canvas.width - 75) + 15, y: i * 74 + 110, width: 56, height: 16, spring: Math.random() < springChance });
            }
        }

        function createParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                particles.push({ x: x + Math.random()*20-10, y, vx: Math.random()*6-3, vy: Math.random()*6-7, life: 32, color });
            }
        }

        function drawPlayer() {
            ctx.save();
            const cx = player.x + player.width/2;
            const cy = player.y + player.height/2 - 4;
            const tilt = Math.max(Math.min(player.vx*0.025,0.35),-0.35);
            ctx.translate(cx,cy); ctx.rotate(tilt);

            ctx.shadowBlur = magnetTime > 0 ? 38 : 15; ctx.shadowColor = magnetTime > 0 ? '#00ffff' : '#8b00ff';
            ctx.fillStyle = '#6B2F9E'; ctx.fillRect(-22,8,44,32);

            ctx.shadowBlur = 10; ctx.shadowColor = '#00ff88';
            ctx.fillStyle = '#00C76A'; ctx.fillRect(-18,-8,36,22);

            ctx.fillStyle = '#00C76A';
            ctx.beginPath(); ctx.ellipse(0,-18,21,19,0,0,Math.PI*2); ctx.fill();

            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.ellipse(-9,-22,7,9,0.15,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(9,-22,7,9,-0.15,0,Math.PI*2); ctx.fill();
            ctx.fillStyle = '#111';
            ctx.beginPath(); ctx.ellipse(-9,-22,3.2,4.2,0,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(9,-22,3.2,4.2,0,0,Math.PI*2); ctx.fill();

            ctx.shadowBlur = magnetTime > 0 ? 42 : 20; ctx.shadowColor = magnetTime > 0 ? '#00ffff' : '#00aaff';
            ctx.fillStyle = selectedCapColor;
            ctx.beginPath(); ctx.ellipse(0,-33,26,14,0,0,Math.PI*2); ctx.fill();

            ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 3;
            ctx.beginPath(); ctx.arc(-11,-37,4.2,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(10,-38,3.8,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(-4,-29,3.1,0,Math.PI*2); ctx.fill();

            ctx.shadowBlur = 25; ctx.shadowColor = '#ff00ff';
            ctx.fillStyle = '#3a0088';
            ctx.beginPath(); ctx.moveTo(-8,-46); ctx.lineTo(8,-46); ctx.lineTo(0,-34); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#ff00ff';
            ctx.beginPath(); ctx.arc(0,-41,3.8 + Math.sin(gameTime*0.25)*0.6,0,Math.PI*2); ctx.fill();

            ctx.restore();
        }

        function drawPlatforms() {
            ctx.shadowBlur = 14; ctx.shadowColor = '#00ff9d';
            for (let p of platforms) {
                ctx.fillStyle = p.spring ? '#ff00cc' : '#00cc77';
                ctx.beginPath();
                ctx.ellipse(p.x + p.width/2, p.y + p.height/2, p.width/2 + 2, p.height/2 + 4, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = '#008844'; ctx.lineWidth = 2.5;
                ctx.beginPath(); ctx.moveTo(p.x+8,p.y+6); ctx.quadraticCurveTo(p.x+p.width/2,p.y+10,p.x+p.width-8,p.y+5); ctx.stroke();
                ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.fillRect(p.x+6,p.y+3,p.width-18,4);
            }
            ctx.shadowBlur = 0;
        }

        function drawPowerUps() {
            ctx.shadowBlur = 18;
            for (let pu of powerUps) {
                if (pu.type === 'coin') {
                    ctx.shadowColor = '#ffff00';
                    ctx.fillStyle = '#ffff00';
                    ctx.beginPath(); ctx.arc(pu.x,pu.y,11,0,Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#000'; ctx.font = 'bold 16px system-ui'; ctx.textAlign = 'center';
                    ctx.fillText('$',pu.x,pu.y+6);
                } else if (pu.type === 'jetpack') {
                    ctx.shadowColor = '#ff4400';
                    ctx.fillStyle = '#ff4400';
                    ctx.fillRect(pu.x-9,pu.y-16,18,30);
                    ctx.fillStyle = '#00ffff';
                    ctx.fillRect(pu.x-13,pu.y-10,26,9);
                } else if (pu.type === 'magnet') {
                    ctx.shadowColor = '#00ffff';
                    ctx.fillStyle = '#00ffff';
                    ctx.fillRect(pu.x-13,pu.y-13,26,26);
                    ctx.fillStyle = '#000';
                    ctx.font = 'bold 22px system-ui';
                    ctx.fillText('🧲',pu.x,pu.y+8);
                }
            }
            ctx.shadowBlur = 0;
        }

        function update() {
            if (!gameRunning || gameState !== 'playing') return;
            gameTime++;
            bgLevel = Math.floor(score / 5000);

            let targetVx = 0;
            if (touchLeft || keys['ArrowLeft'] || keys['a']) targetVx = -1;
            if (touchRight || keys['ArrowRight'] || keys['d']) targetVx = 1;
            player.vx = player.vx * 0.82 + targetVx * player.speed * 0.18;
            player.x += player.vx;
            if (player.x + player.width < 0) player.x = canvas.width;
            if (player.x > canvas.width) player.x = -player.width;

            if (jetpackTime > 0) {
                player.dy = -8.5;
                jetpackTime--;
                if (Math.random() < 0.6) createParticles(player.x+24, player.y+45, 3, '#00ffff');
            } else {
                player.dy += gravity;
            }
            player.y += player.dy;

            for (let p of platforms) {
                if (player.dy > 0 && player.x + player.width > p.x && player.x < p.x + p.width &&
                    player.y + player.height > p.y && player.y + player.height - player.dy <= p.y + 8) {
                    player.y = p.y - player.height;
                    player.dy = p.spring ? -18.5 : -14.2;
                    createParticles(p.x + p.width/2, p.y, 14, p.spring ? '#ff00cc' : '#00ff9d');
                }
            }

            if (player.y < 240 && player.dy < 0) {
                const scroll = 240 - player.y;
                player.y = 240;
                for (let p of platforms) p.y += scroll;
                for (let pu of powerUps) pu.y += scroll;
                score += Math.floor(scroll * 0.55);
            }

            const gap = 70 + Math.min(38, score / 950);
            while (platforms[platforms.length - 1].y > 30) {
                const lastY = platforms[platforms.length - 1].y;
                const springChance = Math.min(0.12, 0.18 - score / 24000);
                platforms.push({
                    x: Math.random() * (canvas.width - 75) + 15,
                    y: lastY - gap - Math.random() * 14,
                    width: 56,
                    height: 16,
                    spring: Math.random() < springChance
                });
            }
            if (platforms[0].y > canvas.height + 40) platforms.shift();

            if (Math.random() < 0.0048 && powerUps.length < 2 && score > 900) {
                const types = ['coin','jetpack','magnet'];
                powerUps.push({
                    x: Math.random() * (canvas.width - 50) + 25,
                    y: -40,
                    type: types[Math.floor(Math.random()*types.length)],
                    vy: 1.4
                });
            }

            for (let i = powerUps.length - 1; i >= 0; i--) {
                const pu = powerUps[i];
                pu.y += pu.vy;

                const dx = player.x + player.width/2 - pu.x;
                const dy = player.y + player.height/2 - pu.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (magnetTime > 0 && pu.type === 'coin' && dist < 140) {
                    pu.x += dx * 0.28;
                    pu.y += dy * 0.28;
                }

                if (player.x < pu.x + 22 && player.x + player.width > pu.x - 22 &&
                    player.y < pu.y + 22 && player.y + player.height > pu.y - 22) {
                    if (pu.type === 'coin') {
                        score += magnetTime > 0 ? 380 : 180;
                        combo++;
                        comboTimer = 90;
                        createParticles(pu.x, pu.y, 20, '#ffff00');
                    } else if (pu.type === 'jetpack') {
                        jetpackTime = 115;
                        createParticles(pu.x, pu.y, 28, '#00ffff');
                    } else if (pu.type === 'magnet') {
                        magnetTime = 280;
                        createParticles(pu.x, pu.y, 40, '#00ffff');
                    }
                    powerUps.splice(i, 1);
                }
                if (pu.y > canvas.height + 30) powerUps.splice(i, 1);
            }

            if (comboTimer > 0) comboTimer--;
            else combo = 0;

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }

            if (player.y > canvas.height + 50) {
                gameRunning = false;
                if (score > highScore) {
                    highScore = Math.floor(score);
                    localStorage.setItem('pmushHigh', highScore);
                }
                document.getElementById('finalScore').textContent = Math.floor(score);
                document.getElementById('gameOver').style.display = 'block';
            }

            document.getElementById('score').textContent = Math.floor(score);
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawBackground();
            if (gameState === 'playing') {
                drawPlatforms();
                drawPowerUps();
                drawPlayer();

                for (let p of particles) {
                    ctx.globalAlpha = p.life / 32;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, 5, 5);
                }
                ctx.globalAlpha = 1;
            }
        }

        function gameLoop() {
            if (gameState === 'playing') update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function saveUsernameAndContinue() {
            const input = document.getElementById('usernameInput').value.trim();
            username = input || 'Sporeholder';
            localStorage.setItem('pmushUsername', username);
            document.getElementById('usernameScreen').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'block';
        }

        function showPlayerSelect() {
            document.getElementById('mainMenu').style.display = 'none';
            const container = document.getElementById('playerSelect');
            container.style.display = 'block';
            const options = document.getElementById('capOptions');
            options.innerHTML = '';
            capColors.forEach(color => {
                const div = document.createElement('div');
                div.className = 'player-option';
                div.style.background = color;
                if (color === selectedCapColor) div.classList.add('selected');
                div.onclick = () => {
                    selectedCapColor = color;
                    localStorage.setItem('pmushCapColor', color);
                    document.querySelectorAll('.player-option').forEach(o => o.classList.remove('selected'));
                    div.classList.add('selected');
                };
                options.appendChild(div);
            });
        }

        function startGameFromSelect() {
            document.getElementById('playerSelect').style.display = 'none';
            startGame();
        }

        function startGame() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('playerSelect').style.display = 'none';
            document.getElementById('ui').style.display = 'flex';
            gameState = 'playing';
            gameRunning = true;
            score = 0;
            combo = 0;
            player.x = 180; player.y = 450; player.dy = -12; player.vx = 0;
            jetpackTime = 0; magnetTime = 0;
            powerUps = []; particles = [];
            generatePlatforms();
        }

        function showLeaderboard() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('leaderboardScreen').style.display = 'block';
            renderLeaderboard();
        }

        function renderLeaderboard() {
            const container = document.getElementById('lbList');
            container.innerHTML = '';
            leaderboard.forEach((entry, i) => {
                const div = document.createElement('div');
                div.className = 'lb-entry';
                div.innerHTML = `<span>#${i+1} ${entry.name}</span><span style="color:#00ff9d">${entry.score}</span>`;
                container.appendChild(div);
            });
            if (leaderboard.length === 0) container.innerHTML = '<p style="color:#aaa; text-align:center;">No scores yet. Be the first!</p>';
        }

        function backToMainMenu() {
            document.getElementById('leaderboardScreen').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('ui').style.display = 'none';
            document.getElementById('playerSelect').style.display = 'none';
            document.getElementById('pauseMenu').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'block';
            gameState = 'menu';
            document.getElementById('menuHigh').textContent = highScore;
        }

        function submitScoreAndBack() {
            if (score > 0) {
                leaderboard.push({ name: username || 'Sporeholder', score: Math.floor(score) });
                leaderboard.sort((a,b) => b.score - a.score);
                leaderboard = leaderboard.slice(0,10);
                localStorage.setItem('pmushLB', JSON.stringify(leaderboard));
            }
            backToMainMenu();
        }

        function backToTitle() {
            document.getElementById('usernameScreen').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'block';
        }

        function pauseGame() {
            gameRunning = false;
            document.getElementById('pauseMenu').style.display = 'block';
        }

        function resumeGame() {
            document.getElementById('pauseMenu').style.display = 'none';
            gameRunning = true;
        }

        function quitToMain() {
            document.getElementById('pauseMenu').style.display = 'none';
            document.getElementById('ui').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'block';
            gameState = 'menu';
        }

        function viewLeaderboardFromGameOver() {
            document.getElementById('gameOver').style.display = 'none';
            showLeaderboard();
        }

        // Controls
        canvas.addEventListener('touchstart', e => {
            if (gameState !== 'playing') return;
            const rect = canvas.getBoundingClientRect();
            for (let t of e.touches) {
                if (t.clientX - rect.left < canvas.width / 2) touchLeft = true;
                else touchRight = true;
            }
        });
        canvas.addEventListener('touchend', () => { touchLeft = touchRight = false; });
        canvas.addEventListener('touchmove', e => {
            touchLeft = touchRight = false;
            const rect = canvas.getBoundingClientRect();
            for (let t of e.touches) {
                if (t.clientX - rect.left < canvas.width / 2) touchLeft = true;
                else touchRight = true;
            }
        });

        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        // Init
        document.getElementById('menuHigh').textContent = highScore;
        gameLoop();
    </script>
</body>
</html>
